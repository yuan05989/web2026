<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind 基礎：旅遊網站 Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-emerald-600 text-white">

    <!-- Section: Colors, Text, Spacing -->
    <section class="bg-blue-600 text-emerald-50 p-12 text-center">
        <h1 class="text-4xl text-emerald-50 font-bold mb-4">探索未知的世界</h1>
        <p class="text-xl text-emerald-50 opacity-90 mb-8">尋找您的下一個冒險目的地，開啟難忘的旅程。</p>
        <a href="#" class="bg-blue-50 text-emerald-700 px-6 py-3 rounded-full font-semibold hover:bg-blue-50 transition">
            立即開始
        </a>
    </section>

    <div class="max-w-4xl mx-auto p-8">
        <h2 class="text-2xl text-emerald-50 font-semibold text-gray-800 mb-6">本單元觀念</h2>
        <ul class="space-y-4">
            <li class="flex items-start">
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-mono mr-3">bg-blue-600</span>
                <span>背景顏色：藍色 (強度 600)</span>
            </li>
            <li class="flex items-start">
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-mono mr-3">text-4xl</span>
                <span>字體大小：非常大</span>
            </li>
            <li class="flex items-start">
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-mono mr-3">p-12</span>
                <span>內距 (Padding)：上下左右 3rem</span>
            </li>
            <li class="flex items-start">
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-mono mr-3">mb-4</span>
                <span>外距 (Margin-Bottom)：下方留白 1rem</span>
            </li>
        </ul>
    </div>

</body>

</html>
